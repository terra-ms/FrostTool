[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--strict-markers --tb=short"
markers = [
    "unit: unit tests",
    "integration: integration tests",
    "async: async tests",
]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
check_untyped_defs = true
explicit_package_bases = true

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "N",
    "UP",
    "B",
    "A",
    "C4",
    "PIE",
    "SIM",
]
ignore = [
    "E501",  # line too long — black handles formatting
    "B008",  # function calls in default args — standard FastAPI Depends/Query pattern
    "C408",  # dict() call — Plotly API uses dict() for styling kwargs throughout
]

[[tool.mypy.overrides]]
module = ["s3fs", "diskcache", "rasterio", "rasterio.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Debug/diagnostic endpoints use many untyped nested closures; relax strictness there.
module = ["backend.api.routes.gdd", "backend.api.routes.debug"]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_any_generics = false
